# Example configuration for the industrial defect detection platform

augmentation:
  flip_horizontal: true
  random_crop: false
  noise_level: 0.05

model:
  size: "small" # options: nano, small, medium
  pretrained: true
  num_classes: 1 # Number of defect categories

training:
  epochs: 10
  batch_size: 4
  learning_rate: 0.001
  optimizer: "adam"
  weight_decay: 1e-4
  train_split: 0.4
  valid_split: 0.3
  test_split: 0.3

sampling:
  strategy: "balanced"
  seed: 1234

experiment_name: "defect_detection_v1"
output_dir: "./outputs"
